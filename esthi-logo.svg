  <path d="M92 79H169C175.075 79 180 83.9249 180 90V91C180 97.0751 175.075 102 169 102H117V120H158C164.075 120 169 124.925 169 131V132C169 138.075 164.075 143 158 143H117V161H170C176.075 161 181 165.925 181 172V173C181 179.075 176.075 184 170 184H92C85.9249 184 81 179.075 81 173V90C81 83.9249 85.9249 79 92 79Z" fill="white"/>

  <!-- Leaf/accent mark -->
  <path d="M153.5 66.5C181.5 69.2 197.5 90.5 190.2 113.5C184.7 130.9 165.4 140.4 147.8 135.1C146.2 111.6 151.5 88.3 153.5 66.5Z" fill="url(#leaf)"/>
  <path d="M151 133C162 110 175 92.5 190 79" stroke="#1e3a5f" stroke-width="7" stroke-linecap="round" opacity="0.75"/>

  <!-- Wordmark -->
  <text x="270" y="150" font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="96" font-weight="800" letter-spacing="-3" fill="#1e3a5f">Esthi</text>
  <text x="275" y="194" font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="28" font-weight="600" letter-spacing="1.5" fill="#64748b">ESTHETICS STUDY APP</text>
</svg>
