<svg width="960" height="260" viewBox="0 0 960 260" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Esthi Logo</title>
  <desc id="desc">Esthi wordmark with a rounded app icon and a simple leaf mark.</desc>
  <defs>
    <linearGradient id="bg" x1="40" y1="40" x2="220" y2="220" gradientUnits="userSpaceOnUse">
      <stop stop-color="#1e3a5f"/>
      <stop offset="1" stop-color="#3b82f6"/>
    </linearGradient>
    <linearGradient id="leaf" x1="94" y1="67" x2="166" y2="143" gradientUnits="userSpaceOnUse">
      <stop stop-color="#eff6ff"/>
      <stop offset="1" stop-color="#bfdbfe"/>
    </linearGradient>
    <filter id="shadow" x="18" y="22" width="224" height="224" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="10" stdDeviation="12" flood-color="#0f172a" flood-opacity="0.18"/>
    </filter>
  </defs>

  <g filter="url(#shadow)">
    <rect x="40" y="40" width="180" height="180" rx="46" fill="url(#bg)"/>
  </g>

